    // Quick stats (left column)
    const LX = 60, SY = 80;
    this.add.text(LX,SY,'CYCLE RESULTS',{font:'bold 13px Courier New',color:'#2a5a8a',letterSpacing:2});
    const stats=[
      [`Samples done:`,  String(d.yearSamples)],
      [`Reputation:`,    `⭐ ${d.reputation}`],
      [`Ring stability:`,`${Math.round(d.ringBase)}%`],
    ];
    stats.forEach(([k,v],i)=>{
      this.add.text(LX,    SY+22+i*20, k, {font:'13px Courier New',color:'#3a5a7a'});
      this.add.text(LX+160,SY+22+i*20, v, {font:'bold 13px Courier New',color:'#0d2a4a'});
    });

    // Penalties
    if(d.penalties&&d.penalties.length>0){
      let py=SY+90;
      this.add.text(LX,py,'Unfulfilled:',{font:'12px Courier New',color:'#cc2200'});
      d.penalties.forEach((p,i)=>
        this.add.text(LX+110,py+i*14,`${p.name} ${p.penalty} rep`,
          {font:'12px Courier New',color:'#cc4422'}));
    }

    // Cycle analytics (auto-instrumentation)
    if (d.proposalsDone !== undefined) {
      const aY = SY + 88;
      this.add.text(LX, aY, '── CYCLE ANALYTICS ──',
        {font:'10px Courier New', color:'#6a9abb', letterSpacing:1});
      const effTime   = d.yearSamples > 0 ? (CYCLE_SEC / d.yearSamples).toFixed(1) : '—';
      const repPerSmp = d.yearSamples > 0 ? ((d.repEarned||0) / d.yearSamples).toFixed(1) : '—';
      const aRows = [
        `${d.proposalsDone} done  ·  ${d.proposalsPartial} partial  ·  ${d.penalties.length} failed`,
        `${effTime}s/samp  ·  ${repPerSmp} rep/samp`,
      ];
      aRows.forEach((v, i) => {
        this.add.text(LX, aY+14+i*16, v, {font:'bold 11px Courier New', color:'#0d2a4a'});
      });
    }

    // Paper outcome
    const outcomes=[
      {min:8,txt:'📄 Nature / Science likely'},
      {min:5,txt:'📄 High-impact journal'},
      {min:3,txt:'📄 Journal paper'},
      {min:1,txt:'📄 Conference abstract'},
      {min:0,txt:'❌ No publication'},
    ];
    const out=outcomes.find(o=>d.yearSamples>=o.min);
    this.add.text(LX,SY+160,out.txt,{font:'13px Courier New',color:'#6a4400'});

    // New year funding banner
    if(this.newFundingMsg){
      const fb = this.add.rectangle(LX-8,SY+188,320,26,0xfef8e0).setOrigin(0,0).setStrokeStyle(1,0xccaa44);
      this.add.text(LX+4,SY+199,this.newFundingMsg,{font:'12px Courier New',color:'#7a5500'}).setOrigin(0,0.5);
    }

    // ── UPGRADE SHOP (right side) ────────────────────────────
    const RX = 370;
    this.add.text(RX,SY,'UPGRADES',{font:'bold 13px Courier New',color:'#2a5a8a',letterSpacing:2});
    this.fundingTxt = this.add.text(RX+220,SY,`💰 ${this.funding} available`,
      {font:'bold 13px Courier New',color:'#7a5000'});

    // Divider
    g.lineStyle(1,0xccddee);
    g.lineBetween(RX-12,SY-4,RX-12,GH-60);

    const UPGRADES = [
      { key:'prepCap',      label:'Prep Room × 2',    desc:'Handle 2 samples at once',    cost:180,
        canBuy:()=>this.upgrades.prepCap<2,            apply:()=>this.upgrades.prepCap=2 },
      { key:'measCap',      label:'Measurement × 2',  desc:'Run 2 measurements simultaneously', cost:220,
        canBuy:()=>this.upgrades.measCap<2,            apply:()=>this.upgrades.measCap=2 },
      { key:'prepSpeed',    label:'Faster Prep',       desc:'Prep time −5%',               cost:120,
        canBuy:()=>this.upgrades.prepSpeed>0.96,       apply:()=>this.upgrades.prepSpeed=Math.max(0.95,this.upgrades.prepSpeed-0.05) },
      { key:'measSpeed',    label:'Faster Measurement', desc:'Measurement time −5%',        cost:140,
        canBuy:()=>this.upgrades.measSpeed>0.96,       apply:()=>this.upgrades.measSpeed=Math.max(0.95,this.upgrades.measSpeed-0.05) },
      { key:'extraJob',     label:'Hire Postdoc',      desc:'+1 active job slot (max 5)',  cost:150,
        canBuy:()=>this.upgrades.extraJobSlots<2,      apply:()=>this.upgrades.extraJobSlots=(this.upgrades.extraJobSlots||0)+1 },
      { key:'ringMaint',    label:'Ring Maintenance',  desc:'Halves ring stability decay', cost:100,
        canBuy:()=>!this.upgrades.ringMaint,           apply:()=>this.upgrades.ringMaint=true },
    ];

    this.upgButtons = [];
    UPGRADES.forEach((u,i)=>{
      const uy = SY + 22 + i*72;
      const bg = this.add.rectangle(RX,uy,556,64,0xfafcff).setOrigin(0,0).setStrokeStyle(1,0xaabbcc);
      const lbl= this.add.text(RX+10,uy+8, u.label,{font:'bold 14px Courier New',color:'#1a5a8a'});
      const dsc= this.add.text(RX+10,uy+26,u.desc, {font:'12px Courier New',color:'#2a5a6a'});
      const cst= this.add.text(RX+10,uy+42,`💰 ${u.cost}`,{font:'12px Courier New',color:'#b38600'});
      const btn= this.add.text(RX+460,uy+32,'[ BUY ]',
        {font:'bold 13px Courier New',color:'#0a8a5a'}).setOrigin(1,0.5);
      const owned = this.add.text(RX+460,uy+32,'✓ OWNED',
        {font:'bold 13px Courier New',color:'#0a8a5a'}).setOrigin(1,0.5).setAlpha(0);
      bg.setInteractive({useHandCursor:true});
      btn.setInteractive({useHandCursor:true});
      const doClick = ()=>{
        if(!u.canBuy()){return;}
        if(this.funding-this.spent < u.cost){
          this.fundingTxt.setText(`💰 ${this.funding-this.spent} — not enough!`).setStyle({color:'#cc3300'});
          this.time.delayedCall(1200,()=>this.fundingTxt.setText(`💰 ${this.funding-this.spent} available`).setStyle({color:'#7a5000'}));
          return;
        }
        this.spent += u.cost;
        u.apply();
        this.fundingTxt.setText(`💰 ${this.funding-this.spent} available`);
        this.refreshUpgButtons();
      };
      bg.on('pointerdown',doClick); btn.on('pointerdown',doClick);
      bg.on('pointerover',()=>{ if(u.canBuy()) bg.setFillStyle(0xd0e4f8); });
      bg.on('pointerout', ()=>bg.setFillStyle(u.canBuy()?0xfafcff:0xeeeeee));
      this.upgButtons.push({u,bg,lbl,dsc,cst,btn,owned});
    });
    this.refreshUpgButtons();

    // Auto-save cycle stats to localStorage
    saveStatRecord({
      ts:              new Date().toISOString(),
      year:            d.year,
      cycle:           d.cycle,
      cycleInYear:     d.cycleInYear,
      samples:         d.yearSamples,
      proposalsDone:   d.proposalsDone   ?? null,
      proposalsPartial:d.proposalsPartial ?? null,
      failed:          d.penalties?.length ?? 0,
      repEarned:       d.repEarned        ?? null,
      reputation:      d.reputation,
      funding:         d.funding,
      ring:            d.ringBase,
      upgrades:        d.upgrades,
    });

    // Export / Clear stats buttons (dev tools)
    const expBtn = this.add.text(LX, GH-44, '[ Export Stats JSON ]',
      {font:'10px Courier New', color:'#4a8aba'})
      .setInteractive({useHandCursor:true});
    expBtn.on('pointerover',  () => expBtn.setStyle({color:'#0060cc'}));
    expBtn.on('pointerout',   () => expBtn.setStyle({color:'#4a8aba'}));
    expBtn.on('pointerdown',  () => exportStats());

    const clrBtn = this.add.text(LX, GH-30, '[ Clear Stats ]',
      {font:'10px Courier New', color:'#aa6644'})
      .setInteractive({useHandCursor:true});
    clrBtn.on('pointerover',  () => clrBtn.setStyle({color:'#cc2200'}));
    clrBtn.on('pointerout',   () => clrBtn.setStyle({color:'#aa6644'}));
    clrBtn.on('pointerdown',  () => { clearStats(); clrBtn.setText('[ Cleared ]'); });

    // Continue button
    this.contBtn = this.add.text(GW/2, GH-28, '[ CONTINUE TO PROPOSAL REVIEW ]',
      {font:'bold 16px Courier New',color:'#00ff88'})
      .setOrigin(0.5).setInteractive({useHandCursor:true});
    this.contBtn.on('pointerover',()=>this.contBtn.setStyle({color:'#0a9a55'}));
    this.contBtn.on('pointerout', ()=>this.contBtn.setStyle({color:'#0a7a44'}));
    this.contBtn.on('pointerdown',()=>this.nextScene());

    this.add.text(GW/2,GH-12,'THE BRILLIANT FACILITY  —  M1 Prototype',
      {font:'12px Courier New',color:'#aabbcc'}).setOrigin(0.5);
  }

  refreshUpgButtons(){
    this.upgButtons.forEach(({u,bg,btn,owned})=>{
      const canBuy = u.canBuy();
      bg.setFillStyle(canBuy ? 0xfafcff : 0xeeeeee);
      bg.setStrokeStyle(1, canBuy ? 0xaabbcc : 0xcccccc);
      btn.setAlpha(canBuy ? 1 : 0);
      owned.setAlpha(canBuy ? 0 : 1);
    });
  }

  nextScene(){
    const nextCycleInYear = (this.d.cycleInYear % 3) + 1;
    const nextYear        = nextCycleInYear === 1 ? this.d.year + 1 : this.d.year;
    const nextCycle       = this.d.cycle + 1;
    const saveData = {
      cycle:nextCycle, cycleInYear:nextCycleInYear, year:nextYear,
      reputation:this.d.reputation, ringBase:this.d.ringBase,
      funding: this.funding - this.spent,
      upgrades: this.upgrades,
      beamlineTechs: this.d.beamlineTechs,
    };
    saveGame(saveData);
    this.scene.start('ProposalReview', saveData);
  }
}

    const outcomes=[
      {min:8,txt:'📄 Nature / Science — very likely!', col:'#7a5000'},
      {min:5,txt:'📄 High-impact journal — likely',     col:'#7a5000'},
      {min:3,txt:'📄 Journal paper — possible',         col:'#6a4400'},
      {min:1,txt:'📄 Conference abstract — possible',   col:'#6a4400'},
      {min:0,txt:'❌ No publication expected',          col:'#cc1100'},
    ];
    const out=outcomes.find(o=>d.yearSamples>=o.min);
    this.add.text(GW/2,378,out.txt,{font:'17px Courier New',color:out.col}).setOrigin(0.5);

    if(d.ringBase<60){
      this.add.text(GW/2,416,`⚠  Ring ageing — ${Math.round(d.ringBase)}% stability next year`,
        {font:'14px Courier New',color:'#aa4400'}).setOrigin(0.5);
      this.add.text(GW/2,434,'Consider a Source Upgrade to stabilise the ring.',
        {font:'13px Courier New',color:'#7a3300'}).setOrigin(0.5);
    }

    // Rep penalties from unfinished committed proposals
    if (d.penalties && d.penalties.length > 0) {
      let py = d.ringBase < 60 ? 454 : 416;
      this.add.text(GW/2, py, '⚠  Unfulfilled commitments:',
        {font:'bold 13px Courier New', color:'#cc2200'}).setOrigin(0.5);
      d.penalties.forEach((p, i) => {
        this.add.text(GW/2, py + 16 + i*14, `${p.name}: ${p.penalty} rep`,
          {font:'12px Courier New', color:'#cc4422'}).setOrigin(0.5);
      });
    }

    const nextCycleInYear = (d.cycleInYear % 3) + 1;
    const nextYear        = nextCycleInYear === 1 ? d.year + 1 : d.year;
    const nextCycle       = d.cycle + 1;
    const btnLbl = nextCycleInYear === 1
      ? `[ START CYCLE 1 / YEAR ${nextYear} ]`
      : `[ START CYCLE ${nextCycleInYear} / YEAR ${d.year} ]`;
    const btn=this.add.text(GW/2,484,btnLbl,
      {font:'bold 18px Courier New',color:'#0a7a44'})
      .setOrigin(0.5).setInteractive({useHandCursor:true});
    btn.on('pointerover',()=>btn.setStyle({color:'#0a9a55'}));
    btn.on('pointerout', ()=>btn.setStyle({color:'#0a7a44'}));
    btn.on('pointerdown',()=>this.scene.start('ProposalReview',{
      cycle:nextCycle, cycleInYear:nextCycleInYear, year:nextYear,
      reputation:d.reputation, ringBase:d.ringBase,
    }));

    this.add.text(GW/2,GH-16,'THE BRILLIANT FACILITY  —  M1 Prototype  |  GDD v0.3',
      {font:'12px Courier New',color:'#4a8aaa'}).setOrigin(0.5);
  }
}

// HiDPI fix: auto-set text resolution so text textures match canvas resolution
const _origTextFactory = Phaser.GameObjects.GameObjectFactory.prototype.text;
Phaser.GameObjects.GameObjectFactory.prototype.text = function(x, y, text, style) {
  const obj = _origTextFactory.call(this, x, y, text, style);
  obj.setResolution(DPR);
  return obj;
};

// ── Save / Load ───────────────────────────────────────────────
const SAVE_KEY = 'tbf_save';

function saveGame(data) {
  localStorage.setItem(SAVE_KEY, JSON.stringify({ ...data, savedAt: Date.now() }));
}

function loadGame() {
  try { return JSON.parse(localStorage.getItem(SAVE_KEY)); }
  catch { return null; }
}

function clearSave() {
  localStorage.removeItem(SAVE_KEY);
}

// ── Dev stats (localStorage) ──────────────────────────────────
function saveStatRecord(record) {
  const all = JSON.parse(localStorage.getItem('tbf_stats') || '[]');
  all.push(record);
  localStorage.setItem('tbf_stats', JSON.stringify(all));
}
function exportStats() {
  const data = JSON.parse(localStorage.getItem('tbf_stats') || '[]');
  if (!data.length) { alert('No stats recorded yet.'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `tbf_stats_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function clearStats() {
  localStorage.removeItem('tbf_stats');
}

new Phaser.Game({
  type:Phaser.AUTO,
  backgroundColor:'#cecac4',
  parent:'game-container',
  scene:[BootScene,TutorialScene,ProposalReviewScene,GameScene,CycleEndScene,YearEndScene],
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH,
    width:GW,
    height:GH,
    resolution:DPR,
  },
});
</script>
